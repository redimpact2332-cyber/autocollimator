<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>オートコリメーター記録 v7.7 SAFE</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
<header>
  <div class="title">オートコリメーター記録 v7.7 SAFE</div>
  <div class="topBtns">
    <button id="inputBtn">入力</button>
    <button id="shotBtn">スクショ</button>
    <button id="printBtn">印刷</button>
    <button id="lightBtn" class="themeBtn">☀️</button>
    <button id="darkBtn" class="themeBtn">🌙</button>
  </div>
</header>

<main id="inputView">
  <section class="card">
    <div class="metaGrid">
      <label>製番<input id="serial"></label>
      <label>形格<input id="model"></label>
      <label>名称<input id="name"></label>
      <label>測定日<input id="date" type="date"></label>
      <label>外気温<input id="outsideTemp" inputmode="decimal"></label>
      <label>機体温度<input id="machineTemp" inputmode="decimal"></label>
      <label>測定者<input id="operator"></label>
      <label>備考<input id="note"></label>
    </div>
  </section>

  <section class="card">
    <div class="rowBtns">
      <button data-mode="1">測定1開始</button>
      <button data-mode="2">測定2開始</button>
      <button data-mode="3">測定3開始</button>
      <button data-mode="4">測定4開始</button>
      <button id="undoBtn">Undo</button>
      <button id="redoBtn">Redo</button>
      <button id="clearBtn" class="danger">全消去</button>
    </div>
  </section>

  <section class="card" id="controlCard">
    <div class="controlLine">
      <span>測定位置数</span>
      <button id="countMinus">−</button>
      <input id="pointCountInput" class="smallNumInput" type="number" inputmode="numeric" min="0" max="100" value="40">
      <button id="countPlus">＋</button>
      <button data-count="24">24</button>
      <button data-count="40">40</button>
      <button data-count="100">100</button>
    </div>
    <div class="controlLine">
      <span>平均範囲</span>
      <button id="rangeStartMinus">開始−</button>
      <input id="rangeStartInput" class="smallNumInput" type="number" inputmode="numeric" min="1" max="100" value="1">
      <button id="rangeStartPlus">開始＋</button>
      <button id="rangeEndMinus">終了−</button>
      <input id="rangeEndInput" class="smallNumInput" type="number" inputmode="numeric" min="1" max="100" value="40">
      <button id="rangeEndPlus">終了＋</button>
      <button id="rangeAll">全範囲</button>
    </div>
    <div class="controlLine">
      <span>許容値</span>
      <input id="toleranceInput" class="smallNumInput" type="number" inputmode="decimal" step="0.5" min="0" value="0">
      <span class="note">0なら判定なし</span>
    </div>
    <div class="progress"><div id="progressBar"></div></div>
  </section>

  <section class="card current">
    <div><span>入力中</span><strong>測定<span id="modeText">1</span></strong></div>
    <div><span>測定位置</span><strong id="rowText" class="bigNum">1</strong></div>
    <div><span>入力済</span><strong><span id="doneText">0</span>/<span id="totalText">40</span></strong></div>
  </section>

  <section class="card padCard">
    <div id="readout">0</div>
    <div class="pad">
      <button data-key="7">7</button><button data-key="8">8</button><button data-key="9">9</button><button id="backspace">⌫</button>
      <button data-key="4">4</button><button data-key="5">5</button><button data-key="6">6</button><button id="minusLock">−固定</button>
      <button data-key="1">1</button><button data-key="2">2</button><button data-key="3">3</button><button id="prevRow">戻る</button>
      <button data-key="0">0</button><button id="clearBuf">C</button><button id="skipRow">次へ</button><button id="commit" class="enter">決定</button>
    </div>
  </section>

  <section class="card summary">
    <div><span>平均</span><b id="avgText">0</b></div>
    <div><span>範囲</span><b id="rangeLabel">1-40</b></div>
    <div><span>全体最大差</span><b id="devText">0</b></div>
    <div><span>累計最終</span><b id="lastText">0</b></div>
    <div><span>判定</span><b id="judgeText">---</b></div>
  </section>

  <section class="card">
    <div class="rowBtns graphBtns"><button id="graphInvertYBtn">＋−上下反転</button><button id="graphInvertXBtn">左右反転</button></div>
    <div class="note">グラフ表示だけ反転します。計算値・CSV・保存データは変わりません。</div>
    <div id="devDetailText" class="note">測定1：左 0 / 中央 0 / 右 0</div>
    <canvas id="graph" width="900" height="520"></canvas>
  </section>

  <section class="card">
    <div class="rowBtns">
      <button id="toggleTable">一覧表示/非表示</button>
      <button id="csvBtn">CSV出力</button>
      <button id="jsonBtn">JSON保存</button>
      <label class="fileLabel">JSON読込<input id="jsonLoad" type="file" accept=".json,application/json"></label>
      <button id="historySaveBtn">履歴保存</button>
      <button id="historyToggleBtn">履歴表示</button>
    </div>
    <div id="tableWrap" class="hidden">
      <table id="dataTable">
        <thead><tr><th>位置</th><th>測1</th><th>測2</th><th>測3</th><th>測4</th><th>選択測定平均</th><th>補正</th><th>累計</th></tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
    <div id="historyWrap" class="hidden">
      <h3>測定履歴</h3>
      <div id="historyList"></div>
    </div>
  </section>
</main>

<main id="shotView" class="hidden">
  <section class="card printCard">
    <h2>オートコリメーター測定記録</h2>
    <table class="metaTable">
      <tbody>
        <tr><th>製番</th><td id="pSerial"></td><th>形格</th><td id="pModel"></td></tr>
        <tr><th>名称</th><td id="pName"></td><th>測定日</th><td id="pDate"></td></tr>
        <tr><th>外気温</th><td id="pOutside"></td><th>機体温度</th><td id="pMachine"></td></tr>
        <tr><th>測定者</th><td id="pOperator"></td><th>備考</th><td id="pNote"></td></tr>
      </tbody>
    </table>
    <p id="pSummary"></p>
    <p id="pDevDetail"></p>
    <canvas id="printGraph" width="900" height="520"></canvas>
    <div id="printTable"></div>
    <div class="screenBtns">
      <button id="backInput1">入力画面へ戻る</button>
      <button id="doPrint">印刷</button>
    </div>
  </section>
</main>

<script src="./calc.js"></script>
<script src="./graph.js"></script>
<script src="./app.js"></script>
<script>
if("serviceWorker" in navigator){window.addEventListener("load",()=>navigator.serviceWorker.register("./service-worker.js").catch(()=>{}))}
</script>
</body>
</html>
